version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: docuguard_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - USE_QA_MODEL=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: docuguard_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
